<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitching - Kayla Culminating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto:wght@100..900&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <h1 class="nav-logo">Kayla Culminating</h1>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Reflection</a></li>
                <li><a href="pitching.html" class="nav-link active">Pitching</a></li>
                <li><a href="about-me.html" class="nav-link">About Me</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <section class="page-header-pink">
            <div class="container">
                <h1 class="page-title">pitching</h1>
            </div>
        </section>

        <section class="content-section">
            <div class="container">
                <div class="pitching-intro">
                    <h2 class="pitching-heading">what is pitching</h2>
                </div>

                <div class="pitching-description" id="pitching-description">
                    <p>Loading...</p>
                </div>

                <div class="video-grid">
                    <div class="video-card">
                        <video controls class="pitching-video">
                            <source src="media/feb.MP4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <h3 class="video-title">February</h3>
                        <p class="video-time">Time spent 15 hours</p>
                    </div>

                    <div class="video-card">
                        <video controls class="pitching-video">
                            <source src="media/mar.MP4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <h3 class="video-title">March</h3>
                        <p class="video-time">Time spent 13 hours</p>
                        <p class="video-progress" data-month="march">Loading...</p>
                    </div>

                    <div class="video-card">
                        <video controls class="pitching-video">
                            <source src="media/apr.MP4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <h3 class="video-title">April</h3>
                        <p class="video-time">Time spent 12 hours</p>
                        <p class="video-progress" data-month="april">Loading...</p>
                    </div>

                    <div class="video-card">
                        <video controls class="pitching-video">
                            <source src="media/may.MP4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <h3 class="video-title">May</h3>
                        <p class="video-time">Time spent 14 hours</p>
                        <p class="video-progress" data-month="may">Loading...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Kayla Culminating Project</p>
        </div>
    </footer>

    <script>
    // Load pitching description
    fetch('content/pitching-description.txt')
        .then(response => response.text())
        .then(text => {
            const container = document.getElementById('pitching-description');
            // Convert bullet points to HTML list
            const paragraphs = text.split('\n\n');
            let html = '';

            paragraphs.forEach(para => {
                if (para.includes('•')) {
                    // Convert bullet list
                    const items = para.split('\n').filter(line => line.includes('•'));
                    html += '<ul>';
                    items.forEach(item => {
                        html += `<li>${item.replace('•', '').trim()}</li>`;
                    });
                    html += '</ul>';
                } else {
                    // Regular paragraph, highlight "internal rotation"
                    const highlighted = para.replace('internal rotation', '<strong>internal rotation</strong>');
                    html += `<p>${highlighted}</p>`;
                }
            });

            container.innerHTML = html;
        })
        .catch(err => console.error('Error loading description:', err));

    // Load monthly progress
    fetch('content/monthly-progress.txt')
        .then(response => response.text())
        .then(text => {
            const progressMap = {};
            text.split('\n').forEach(line => {
                if (line.trim()) {
                    const [month, progress] = line.split(':').map(s => s.trim());
                    progressMap[month] = progress;
                }
            });

            // Update each video card
            document.querySelectorAll('[data-month]').forEach(element => {
                const month = element.getAttribute('data-month');
                if (progressMap[month]) {
                    element.textContent = `Improvements: ${progressMap[month]}`;
                }
            });
        })
        .catch(err => console.error('Error loading progress:', err));
    </script>
</body>
</html>
